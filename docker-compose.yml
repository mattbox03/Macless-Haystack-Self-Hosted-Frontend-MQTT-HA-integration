name: find-my-web

# Tracking engine only. Apple and Google providers run in separate stacks.
services:
  tracking-engine:
    image: python:3.12-slim
    container_name: find-my-web
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python server.py"
    ports:
      - "8125:8000"
    environment:
      - ENDPOINT_URL=${APPLE_ENDPOINT_URL}
      - ENDPOINT_USER=${APPLE_ENDPOINT_USER:-}
      - ENDPOINT_PASS=${APPLE_ENDPOINT_PASS:-}
      - GOOGLE_URL=${GOOGLE_ENDPOINT_URL}
      - GOOGLE_TOKEN=${GOOGLE_TOKEN:-}
      - WEB_DIR=/web
      - DATA_DIR=/data
      - DAYS=${APPLE_HISTORY_DAYS:-7}
    volumes:
      # Application code and persistent event database.
      - ${APP_ROOT:-/DATA/AppData/find-my-web}/backend:/app
      - ${APP_ROOT:-/DATA/AppData/find-my-web}/web:/web
      - ${APP_ROOT:-/DATA/AppData/find-my-web}/data:/data
    restart: unless-stopped
