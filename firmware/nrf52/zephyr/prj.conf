# BLE broadcaster only: no connections, scanning, pairing, or GATT application.
CONFIG_BT=y
CONFIG_BT_HCI=y
CONFIG_BT_BROADCASTER=y
# Zephyr 2.7 requires BT_CONN storage when multiple advertising identities are
# enabled. Both advertising sets remain explicitly non-connectable.
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_OBSERVER=n
CONFIG_BT_SMP=n
CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
CONFIG_BT_ID_MAX=2

# Google specifies at least 0 dBm for Find Hub advertisements.
CONFIG_BT_CTLR_TX_PWR_0=y
CONFIG_BT_CTLR_ADVANCED_FEATURES=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y

# Let the kernel and radio controller sleep between advertising events.
CONFIG_PM=y
CONFIG_BOARD_ENABLE_DCDC=y

# Generic coin-cell modules do not always include a 32.768 kHz crystal.
# RC works everywhere. Use XTAL as documented in README for the lowest current.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC_CALIBRATION=y

# Remove development interfaces and logging from the production image.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_PRINTK=n
CONFIG_BOOT_BANNER=n
CONFIG_ASSERT=n

CONFIG_MAIN_STACK_SIZE=1536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_HEAP_MEM_POOL_SIZE=0
